name: Bundled CD

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag such as v0.1.0
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version input
        id: version
        run: |
          VERSION='${{ inputs.version }}'
          if [ -z "$VERSION" ]; then
            echo "Version input is required" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

  package-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Linux desktop packages
        run: npm run package:desktop:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-${{ needs.prepare.outputs.version }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  package-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows desktop packages
        run: npm run package:desktop:windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-${{ needs.prepare.outputs.version }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  package-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        run: |
          echo "Android APK packaging is not implemented yet."
          echo "This bundled CD workflow intentionally blocks release until Android packaging exists."
          exit 1

  release:
    needs:
      - prepare
      - package-linux
      - package-windows
      - package-android
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-desktop-${{ needs.prepare.outputs.version }}
          path: release-assets/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-desktop-${{ needs.prepare.outputs.version }}
          path: release-assets/windows

      - name: Create GitHub release placeholder
        run: |
          echo "All three platform jobs succeeded."
          echo "Attach Linux/Windows/Android artifacts here in the future."
